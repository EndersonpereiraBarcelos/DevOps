- hosts: terraform-ansible
  tasks:
  - name: instalando python3, venv
    apt: 
      pkg:
      - python3
      - virtualenv
      update_cache: yes
    become: yes
  - name: instalando dependencia
    pip:
      virtualenv: /home/ubuntu/tcc/venv
      name:
        - django
        - djangorestframework
    lineinfile:
      path: /home/ubuntu/tcc/setup/settings.py
      regexp: 'ALLOWED_HOSTS'
      line: 'ALLOWED_HOSTS = ["*"]'
      backrefs: yes 
