- hosts: terraform-ansible
  tasks:
  - name: instalando python3, venv
    apt: 
      pkg:
      - python3
      - virtualenv
      update_cache: yes
    become: yes

  - name: instalando dependencia
    pip:
      virtualenv: /home/ubuntu/tcc/venv
      name:
        - django
        - djangorestframework
  - name:
    shell: "./home/ubuntu/tcc/venv/bin/activate"
